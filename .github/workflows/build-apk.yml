name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ai-news-web/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        working-directory: ./ai-news-web
        run: npm ci

      - name: Build web app
        working-directory: ./ai-news-web
        run: npm run build

      - name: Add Android platform
        working-directory: ./ai-news-web
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: ./ai-news-web
        run: npx cap sync android

      - name: Build debug APK
        working-directory: ./ai-news-web/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-news-apk
          path: ai-news-web/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
